version: "3.9"

services:

  fibonacci-api:
    build: .
    container_name: fibonacci-api

    ports:
      - "8000:8000"

    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318

    volumes:
      - ./logs:/app/logs

    depends_on:
      - otel-collector


  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector

    command:
      - "--config=/etc/otelcol/config.yaml"

    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro

    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"

    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.5.0
    container_name: tempo

    command:
      - "-config.file=/etc/tempo.yaml"

    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo.yaml:ro

    ports:
      - "3200:3200"

  grafana:
    image: grafana/grafana:latest

    container_name: grafana

    ports:
      - "3000:3000"

    depends_on:
      - tempo
      - loki
      - prometheus

    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

  loki:

    image: grafana/loki:2.9.10

    container_name: loki

    command:
      - "-config.file=/etc/loki/local-config.yaml"

    ports:
      - "3100:3100"

    volumes:
      - ./docker/loki/loki-config.yaml:/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    container_name: promtail

    command:
      - "-config.file=/etc/promtail/config.yaml"

    volumes:
      - ./docker/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - ./logs:/app/logs

    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:latest

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

    depends_on:
      - fibonacci-api

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter

    ports:
      - "9100:9100"

    command:
      - "--path.rootfs=/host"

    volumes:
      - /:/host:ro

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor

    ports:
      - "8080:8080"

    privileged: true

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

volumes:
  grafana-storage:
  logs:

